<style>
/* ==========================================================================
   1. CONFIGURACIÓN BASE Y VARIABLES DE ENTORNO
   ========================================================================== */
:root {
  --color-morado: #6f42c1;
  --color-morado-light: #f3f0ff;
  --color-turquesa: #3bf7f7;
  --color-verde-custom: #28a745;
  --color-texto-dark: #212529;
  --color-texto-muted: #6c757d;
  --base-font-size: 14px;
  --transition-fast: all 0.2s ease;
  --transition-normal: all 0.3s ease;
  
  /* Accesibilidad y Controles */
  --controls-bg: #ffffff;
  --controls-border: #ced4da;
  --controls-text: #212529;
}

/* Aplicación global de tipografía y legibilidad */
body, .form-control, .btn, .table, label, .input-group-text, h3 {
  font-size: var(--base-font-size) !important;
  color: var(--color-texto-dark);
}

body { 
  background-color: #f4f7f6 !important; 
  padding: 15px; 
  transition: var(--transition-fast);
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

.btn {
    height: auto !important;
    min-height: 38px;
    white-space: normal;
    word-wrap: break-word;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
}

.form-group {
    display: flex;
    flex-direction: column;
    width: 100%;
}

.input-group {
    display: flex;
    flex-direction: row !important; /* Forzamos fila */
    width: 100%;
    align-items: stretch;
}

label {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.dropdown-toggle {
    display: flex !important;
    align-items: center;
    gap: 5px;
}

/* ==========================================================================
   2. COMPONENTES DE INTERFAZ (UI) Y ACCESIBILIDAD
   ========================================================================== */

.font-size-control {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 2000;

  padding: 6px 14px;

  transition: var(--transition-normal);
}

.font-size-control:hover { 
  background: #f1f3f5; 
  transform: scale(1.05); 
}

.modern-card {

}

/* ==========================================================================
   3. ESTRUCTURA DE LA "ZONA ROJA" (CABECERA DE ÓRDENES) - OPTIMIZADO
   ========================================================================== */
.card-header-flex {
  display: flex;
  justify-content: space-between;

}

}

}
.input-header-clean {

}

  }
}
/* Estilo para el nuevo botón de historial en cabecera */
.btn-historial-header {

  border-radius: 6px;

  /* Asegura que el texto no se oculte si crece mucho */
  overflow: visible; 
}

/* ==========================================================================
   4. FORMULARIOS Y AJUSTE DE INPUTS - LIMPIO
   ========================================================================== */
.form-control, .form-floating > label {
  border-radius: 8px;
}

/* Restauramos la altura estándar para evitar cortes visuales */
.form-floating > .form-control {
  height: 3.8rem !important; /* Ligeramente más alto para que el texto no se sobreponga */
  padding-top: 1.625rem !important;
  padding-bottom: 0.625rem !important;
}

.form-floating > label {
  padding-top: 1.1rem !important;
  color: var(--color-texto-muted) !important;
}

/* Evitar sobreposición al flotar */
.form-floating > .form-control:focus ~ label,
.form-floating > .form-control:not(:placeholder-shown) ~ label {
  transform: scale(0.85) translateY(-0.85rem) translateX(0.15rem) !important;
  opacity: 0.9;
  color: var(--color-morado) !important;
}

/* ==========================================================================
   6. TABLAS Y ESTADOS
   ========================================================================== */

#loading-overlay {
    position: fixed;
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%;
    background: rgba(255, 255, 255, 0.8); /* Fondo un poco más denso para visibilidad */
    display: none; 
    justify-content: center;
    align-items: center;
    /* 🚨 AJUSTE CRUCIAL: z-index superior a Modales (1050) y SweetAlert (1060+) */
    z-index: 2000 !important; 
    flex-direction: column;
    pointer-events: none; 
}

/* Solo bloqueamos clics cuando el spinner esté realmente visible */

    pointer-events: all;
}

.spinner-custom {
    width: 60px; /* Un poco más grande para que destaque */

/* ==========================================================================
   9. PANTALLA DE BLOQUEO SPA UNIFICADA (GLASSMORPHISM)
   ========================================================================== */
#pantallaBloqueo {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 50%, #0f3460, #08080e 90%);
    z-index: 999999 !important; /* Por encima de absolutamente todo */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    color: #ffffff;
}

.lock-card {
    background: rgba(18, 18, 18, 0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    position: relative;
    text-align: center;
    animation: lockFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.lock-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #e94560, transparent, #0f3460);
    border-radius: 26px;
    z-index: -1;
    filter: blur(8px);
    opacity: 0.3;
}

.lock-header {
    margin-bottom: 25px;
}

.lock-header h2 {
    font-weight: 800;
    font-size: 2rem !important;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 10px;
}

.lock-form-control {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    color: #fff !important;
    border-radius: 12px !important;
    padding: 12px 20px !important;
    font-size: 1rem !important;
    height: auto !important;
    transition: all 0.3s ease;
}

.lock-form-control:focus {
    background: rgba(255, 255, 255, 0.1) !important;
    border-color: #e94560 !important;
    box-shadow: 0 0 10px rgba(233, 69, 96, 0.25) !important;
}

.lock-btn-submit {
    background: linear-gradient(135deg, #e94560, #ff758c) !important;
    border: none !important;
    color: white !important;
    font-weight: 700 !important;
    border-radius: 12px !important;
    padding: 12px !important;
    font-size: 1.1rem !important;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3) !important;
    width: 100%;
}

.lock-btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5) !important;
    filter: brightness(1.1);
}

.lock-spinner-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(8, 8, 14, 0.9);
    border-radius: 24px;
    z-index: 10;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.lock-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid #e94560;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes lockFadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
