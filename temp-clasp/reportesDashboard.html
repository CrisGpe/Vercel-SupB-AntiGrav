    <script>
      document.addEventListener('DOMContentLoaded', () => {
        cargarReportes();
      });

      function cargarReportes() {
        if (window.mostrarSpinner) window.mostrarSpinner("Cargando Reportes...");
        google.script.run
          .withSuccessHandler(function(data) {
            if (window.ocultarSpinner) window.ocultarSpinner();
            
            // Llenar KPIs
            document.getElementById('repCitasHoy').innerText = data.citasHoy || 0;
            document.getElementById('repFacturacionHoy').innerText = 'S/ ' + (data.facturacionHoy || 0).toFixed(2);
            document.getElementById('repOrdenesActivas').innerText = data.ordenesActivas || 0;
            document.getElementById('repInsumosCriticos').innerText = data.insumosCriticos || 0;

            // Renderizar Gráfico de Barra
            const ctxBar = document.getElementById('chartFacturacionEstilistas').getContext('2d');
            new Chart(ctxBar, {
              type: 'bar',
              data: {
                labels: data.estilistasNombres || [],
                datasets: [{
                  label: 'Monto Total Facturado (S/)',
                  data: data.estilistasFacturacion || [],
                  backgroundColor: 'rgba(111, 66, 193, 0.7)',
                  borderColor: 'rgba(111, 66, 193, 1)',
                  borderWidth: 1
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  y: { beginAtZero: true }
                }
              }
            });

            // Renderizar Gráfico de Torta
            const ctxPie = document.getElementById('chartTiposServicio').getContext('2d');
            new Chart(ctxPie, {
              type: 'pie',
              data: {
                labels: data.serviciosCategorias || [],
                datasets: [{
                  data: data.serviciosCantidades || [],
                  backgroundColor: [
                    '#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0', '#afdf22'
                  ]
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false
              }
            });
          })
          .withFailureHandler(function(err) {
            if (window.ocultarSpinner) window.ocultarSpinner();
            Swal.fire("Error", "No se pudieron obtener datos de reportes: " + err.message, "error");
          })
          .obtenerDatosResumenReportes();
      }
    </script>
