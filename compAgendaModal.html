<script>
/**
 * GESTIÓN DE AGENDA Y CALENDARIO - VERSIÓN SIN WHATSAPP
 */
let calendar; 

// 1. FUNCIONES DE APERTURA Y CARGA
window.mostrarAgendaDelMesEnModal = function() {
  const modalEl = document.getElementById('agendaModal');
  if (!modalEl) return;
  
  // Registrar el listener antes de mostrar para asegurar que Bootstrap lo dispare
  modalEl.removeEventListener('shown.bs.modal', ejecutarCargaAgenda);
  modalEl.addEventListener('shown.bs.modal', ejecutarCargaAgenda);
  
  const instancia = bootstrap.Modal.getOrCreateInstance(modalEl);
  instancia.show();
};

function ejecutarCargaAgenda() {
  console.log("DEBUG: Modal abierto, cargando datos unificados...");
  cargarDatosDesdeGoogleSheets();
  inicializarCalendario();
}

// 2. INICIALIZACIÓN DE FULLCALENDAR
function inicializarCalendario() {
  const calendarEl = document.getElementById('calendar');
  if (!calendarEl) return;

  if (calendar) {
    calendar.updateSize();
    calendar.refetchEvents();
    return;
  }

  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'es',
    height: 500,
    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
    eventClick: function(info) {
      var ev = info.event;
      var props = ev.extendedProps;

      if (props.tipo === 'CitaAgrupada') {
        mostrarDetalleCitas(props.detalles, ev.startStr);
      } 
      else if (props.tipo === 'Cumpleaños' && !ev.id.includes("AGENTE")) {
        var nombreCliente = ev.title.replace('🎂 Cumpleaños: ', '').replace('Cliente: ', '');
        var tel = props.telefono || "";
        
        var mensaje = encodeURIComponent('¡Hola ' + nombreCliente + '! ✨ De parte de todo el equipo de GLOSS, te deseamos un muy feliz cumpleaños. Que pases un día increíble. 🎂🎉');
        var urlWa = 'https://wa.me/' + tel + '?text=' + mensaje;

        // Usamos concatenación estándar para evitar el error de "Unexpected token"
        var htmlContenido = '<div class="text-center">' +
                            '<p>🎁 <strong>' + nombreCliente + '</strong> está de cumpleaños hoy.</p>';
        
        if (tel) {
          htmlContenido += '<a href="' + urlWa + '" target="_blank" class="btn btn-success mt-3">' +
                           '<i class="fab fa-whatsapp"></i> Enviar Saludo por WhatsApp' +
                           '</a>';
        } else {
          htmlContenido += '<p class="text-muted small"><i>No hay teléfono registrado para este cliente</i></p>';
        }
        
        htmlContenido += '</div>';

        Swal.fire({
          title: '¡Es su cumpleaños!',
          html: htmlContenido,
          showConfirmButton: false,
          showCloseButton: true
        });
      } 
      else {
        Swal.fire({
          title: 'Detalle del Evento',
          text: ev.title,
          icon: 'info',
          confirmButtonColor: ev.backgroundColor || '#3085d6'
        });
      }
    },
    events: function(fetchInfo, successCallback) {
      console.log("CALENDARIO: Solicitando datos al servidor...");

      google.script.run.withSuccessHandler(function(resRaw) {
        try {
          const res = JSON.parse(resRaw);
          const eventosAgenda = res.eventosAgenda || [];
          const cumples = res.cumples || [];
          const cumplesStaff = res.cumplesStaff || [];
          const citas = res.citas || [];

          const listaBase = eventosAgenda
            .concat(cumples)
            .concat(cumplesStaff)
            .map(ev => {
              if (!ev || !ev.fecha) return null;
              const fechaFinal = transformarFechaParaCalendario(ev.fecha);
              if (!fechaFinal) return null;
              
              let bgColor = '#f39c12'; // default color
              if (ev.tipo === 'Ausencia') {
                bgColor = '#e74c3c'; // Rojo para ausencias
              } else if (ev.id && ev.id.includes("AGENTE")) {
                bgColor = '#9b59b6'; // Morado para cumples staff
              }
              
              return {
                id: ev.id,
                title: ev.descripcion,
                start: fechaFinal,
                backgroundColor: bgColor,
                extendedProps: { 
                  tipo: ev.tipo, 
                  telefono: ev.telefono 
                }
              };
            })
            .filter(Boolean);

          const citasAgrupadas = {};
          citas.forEach(c => {
            if (!c || !c.fecha) return;
            const fechaIso = transformarFechaParaCalendario(c.fecha);
            if (!fechaIso) return;
            if (!citasAgrupadas[fechaIso]) citasAgrupadas[fechaIso] = [];
            citasAgrupadas[fechaIso].push(c);
          });

          const eventosCitas = Object.keys(citasAgrupadas).map(fechaIso => ({
            title: `📅 ${citasAgrupadas[fechaIso].length} Citas`,
            start: fechaIso,
            backgroundColor: '#28a745',
            extendedProps: { tipo: 'CitaAgrupada', detalles: citasAgrupadas[fechaIso] }
          }));

          successCallback(listaBase.concat(eventosCitas));
        } catch (e) {
          console.error("Error al parsear eventos de calendario:", e);
          successCallback([]);
        }
      }).obtenerDatosAgendaCompletos();
    }
  });
  calendar.render();
}

// 3. CARGA DE TABLA DESDE GOOGLE SHEETS CON PAGINACIÓN PREMIUM
window.AGENDA_ITEMS_ALL = [];
window.AGENDA_ITEMS_FILTERED = [];
window.AGENDA_CURRENT_PAGE = 1;

function cargarDatosDesdeGoogleSheets() {
  const tbody = document.getElementById('bodyTablaAgenda');
  const template = document.getElementById('plantillaFilaAgenda');
  if (!tbody || !template) return;

  tbody.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-dark"></div><div class="small mt-2 text-muted fw-semibold">Cargando eventos...</div></div>';

  google.script.run.withSuccessHandler(function(resRaw) {
    try {
      const res = JSON.parse(resRaw);
      const netas = res.eventosAgenda || [];
      const cumples = res.cumples || [];
      const cumplesStaff = res.cumplesStaff || [];
      const citas = res.citas || [];

      const citasAdaptadas = citas.map(c => {
        let fechaStr = "01/01/2026";
        if (c.fecha) {
          if (c.fecha.includes('-')) {
            fechaStr = c.fecha.split('-').reverse().join('/');
          } else {
            fechaStr = String(c.fecha);
          }
        }
        return {
          fecha: fechaStr,
          descripcion: `CITA: ${c.cliente} - ${c.servicio} (${c.hora})`,
          estado: 'Pendiente', prioridad: 'CITA', tipo: 'Cita', id: c.id
        };
      });

      const listaCompleta = netas
        .concat(cumples)
        .concat(cumplesStaff)
        .concat(citasAdaptadas)
        .filter(ev => ev && ev.fecha);

      const parseFechaParaSort = (fStr) => {
        if (!fStr) return new Date(0);
        const str = String(fStr).trim();
        if (str.includes('/')) {
          const p = str.split('/');
          return new Date(`${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`);
        }
        if (str.includes('-')) {
          return new Date(str);
        }
        return new Date(str);
      };

      listaCompleta.sort((a, b) => parseFechaParaSort(a.fecha) - parseFechaParaSort(b.fecha));

      // Guardar en variables globales de paginación
      window.AGENDA_ITEMS_ALL = listaCompleta;
      window.AGENDA_ITEMS_FILTERED = [...listaCompleta];
      window.AGENDA_CURRENT_PAGE = 1;

      // Renderizar primera página
      window.renderizarPaginaAgenda();

    } catch(err) {
      console.error("Error al cargar los datos de agenda:", err);
      tbody.innerHTML = '<div class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle fs-3 d-block mb-2"></i> Error al cargar datos.</div>';
    }
  }).obtenerDatosAgendaCompletos();
}

window.renderizarPaginaAgenda = function() {
  const tbody = document.getElementById('bodyTablaAgenda');
  const template = document.getElementById('plantillaFilaAgenda');
  if (!tbody || !template) return;

  tbody.innerHTML = "";

  const total = window.AGENDA_ITEMS_FILTERED.length;
  if (total === 0) {
    tbody.innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-info-circle fs-3 d-block mb-2"></i> No se encontraron registros.</div>';
    document.getElementById('infoPaginacionAgenda').textContent = "Mostrando 0 a 0 de 0 registros";
    document.getElementById('ulPaginacionAgenda').innerHTML = "";
    return;
  }

  const length = parseInt(document.getElementById('selectPageLengthAgenda').value) || 10;
  const totalPages = Math.ceil(total / length);

  if (window.AGENDA_CURRENT_PAGE > totalPages) {
    window.AGENDA_CURRENT_PAGE = totalPages;
  }
  if (window.AGENDA_CURRENT_PAGE < 1) {
    window.AGENDA_CURRENT_PAGE = 1;
  }

  const start = (window.AGENDA_CURRENT_PAGE - 1) * length;
  const end = Math.min(start + length, total);

  const slice = window.AGENDA_ITEMS_FILTERED.slice(start, end);

  slice.forEach(ev => {
    const clon = template.content.cloneNode(true);
    const card = clon.querySelector('.agenda-item-card');
    const badge = clon.querySelector('.celda-prioridad');
    const celdaEstado = clon.querySelector('.celda-estado');

    clon.querySelector('.celda-fecha').textContent = ev.fecha;
    clon.querySelector('.celda-descripcion').textContent = ev.descripcion;

    let borderLeftColor = '#3498db'; // Default azul

    if (ev.tipo === 'Cumpleaños') {
      const esStaff = ev.id && ev.id.includes("AGENTE");
      badge.textContent = esStaff ? '🎂 CUMPLE STAFF' : '🎂 CUMPLE CLIENTE';
      badge.className = `celda-prioridad badge ${esStaff ? 'bg-secondary bg-gradient text-white' : 'bg-warning bg-gradient text-dark'}`;
      borderLeftColor = esStaff ? '#9b59b6' : '#f1c40f'; // Morado o Amarillo
    } else if (ev.tipo === 'Cita') {
      badge.className = 'celda-prioridad badge bg-success bg-gradient text-white';
      badge.textContent = '📅 CITA';
      borderLeftColor = '#2ecc71'; // Verde
    } else if (ev.tipo === 'Ausencia') {
      badge.className = 'celda-prioridad badge bg-danger bg-gradient text-white text-uppercase';
      badge.textContent = '✈️ Ausencia';
      borderLeftColor = '#e74c3c'; // Rojo
    } else {
      badge.textContent = `📝 PENDIENTE (${ev.prioridad})`;
      if (ev.prioridad === 'Alta') {
        badge.className = 'celda-prioridad badge bg-danger bg-gradient text-white';
        borderLeftColor = '#e74c3c'; // Rojo
      } else if (ev.prioridad === 'Media') {
        badge.className = 'celda-prioridad badge bg-warning bg-gradient text-dark';
        borderLeftColor = '#f39c12'; // Amarillo
      } else {
        badge.className = 'celda-prioridad badge bg-info bg-gradient text-white';
        borderLeftColor = '#3498db'; // Azul
      }
    }

    if (card) {
      card.style.borderLeftColor = borderLeftColor;
    }

    if (celdaEstado) {
      celdaEstado.textContent = ev.estado;
      if (ev.estado === 'Completado' || ev.estado === 'Resuelta' || ev.estado === 'Realizada' || ev.estado === 'Migrado') {
        celdaEstado.className = 'celda-estado badge rounded-pill px-3 py-1 bg-success-subtle text-success border border-success-subtle';
      } else if (ev.estado === 'Cancelada' || ev.estado === 'Cancelado' || ev.estado === 'No asistió') {
        celdaEstado.className = 'celda-estado badge rounded-pill px-3 py-1 bg-danger-subtle text-danger border border-danger-subtle';
      } else {
        celdaEstado.className = 'celda-estado badge rounded-pill px-3 py-1 bg-warning-subtle text-warning-emphasis border border-warning-subtle';
      }
    }

    // Botones de acción
    const contenedorBtn = clon.querySelector('.contenedor-accion');
    if (ev.tipo !== 'Cumpleaños') { // No se borran/editan cumples desde aquí
       agregarBotonesAccion(contenedorBtn, ev);
    }

    tbody.appendChild(clon);
  });

  // Actualizar Info Footer
  document.getElementById('infoPaginacionAgenda').textContent = `Mostrando ${start + 1} a ${end} de ${total} registros`;

  // Renderizar Botones Paginación
  renderizarBotonesPaginacionAgenda(totalPages);
};

function renderizarBotonesPaginacionAgenda(totalPages) {
  const ul = document.getElementById('ulPaginacionAgenda');
  if (!ul) return;
  ul.innerHTML = "";

  // Botón Anterior
  const liPrev = document.createElement('li');
  liPrev.className = `page-item ${window.AGENDA_CURRENT_PAGE === 1 ? 'disabled' : ''}`;
  liPrev.innerHTML = `<a class="page-link border-0 rounded-3 text-dark fw-semibold" href="javascript:void(0)" onclick="window.cambiarPaginaAgenda(${window.AGENDA_CURRENT_PAGE - 1})">Anterior</a>`;
  ul.appendChild(liPrev);

  // Determinar rango de páginas a mostrar (para no desbordar si hay 50 páginas)
  let startPage = Math.max(1, window.AGENDA_CURRENT_PAGE - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  if (endPage - startPage < 4) {
    startPage = Math.max(1, endPage - 4);
  }

  // Páginas
  for (let i = startPage; i <= endPage; i++) {
    const li = document.createElement('li');
    li.className = `page-item ${window.AGENDA_CURRENT_PAGE === i ? 'active' : ''}`;
    li.innerHTML = `<a class="page-link border-0 rounded-3 fw-bold px-3 ${window.AGENDA_CURRENT_PAGE === i ? '' : 'text-dark'}" href="javascript:void(0)" onclick="window.cambiarPaginaAgenda(${i})">${i}</a>`;
    ul.appendChild(li);
  }

  // Botón Siguiente
  const liNext = document.createElement('li');
  liNext.className = `page-item ${window.AGENDA_CURRENT_PAGE === totalPages ? 'disabled' : ''}`;
  liNext.innerHTML = `<a class="page-link border-0 rounded-3 text-dark fw-semibold" href="javascript:void(0)" onclick="window.cambiarPaginaAgenda(${window.AGENDA_CURRENT_PAGE + 1})">Siguiente</a>`;
  ul.appendChild(liNext);
}

function transformarFechaParaCalendario(fechaStr) {
  if (!fechaStr) return null;
  const f = fechaStr.toString().trim();
  
  // Si ya es ISO (2026-01-10)
  if (f.includes('-') && f.split('-')[0].length === 4) return f;
  
  // Si es DD/MM/YYYY (10/01/2026)
  const p = f.split('/');
  if (p.length === 3) {
    return `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
  }
  
  // Si viene en formato ISO completo con 'T' (ej: 2026-01-10T00:00:00.000Z)
  if (f.includes('T')) {
    return f.split('T')[0];
  }
  
  console.warn("JS: Formato de fecha no reconocido:", fechaStr);
  return null;
}

<script>
/**
 * --- GESTIÓN DE MODAL DE CITAS ---
 * Maneja la lógica de reserva de citas, generación de horarios y envío al servidor.
 */
(function() {

    let citaModal; 

    document.addEventListener('DOMContentLoaded', () => {
        const modalElement = document.getElementById('modalCita');
        if (modalElement) {
            citaModal = new bootstrap.Modal(modalElement);
        }
        cargarSelectHorarios();
    });

    /**
     * Genera horarios en intervalos de 15 min.
     */
    function generarOpcionesHora(inicioHora, finHora) {
      const opciones = [];
      for (let h = inicioHora; h <= finHora; h++) {
        for (let m = 0; m < 60; m += 15) {
          if (h === finHora && m > 0) break;
          opciones.push(`${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`);
        }
      }
      return opciones;
    }

    /**
     * Carga el SELECT con formato 12h pero valor 24h.
     */
    function cargarSelectHorarios() {
      const select = document.getElementById('horaInputCitaModal');
      if (!select) return;

      const horarios = generarOpcionesHora(7, 21); 
      select.innerHTML = '<option value="" disabled selected>Seleccione una hora</option>';

      const fragment = document.createDocumentFragment();
      horarios.forEach(hora24h => {
        const [h, m] = hora24h.split(':');
        const hNum = parseInt(h, 10);
        const meridiano = hNum >= 12 ? 'PM' : 'AM';
        const hora12h = hNum % 12 || 12;

        const option = document.createElement('option');
        option.value = hora24h;
        option.textContent = `${hora12h}:${m} ${meridiano}`;
        fragment.appendChild(option);
      });
      select.appendChild(fragment);
    }

    function abrirModalCita() {
      const inputFecha = document.getElementById('fechaInputCitaModal');
      if (inputFecha && !inputFecha.value) {
        inputFecha.value = new Date().toISOString().split('T')[0];
      }
      if (citaModal) citaModal.show();
    }

    function cerrarModalCita() {
      if (citaModal) citaModal.hide();
      // Limpieza masiva de campos
      ['fechaInputCitaModal', 'horaInputCitaModal', 'clientesDatalistCitaModal', 
        'agentesDisponiblesDatalistCitaModal', 'tipoOATCDatalistCitaModal'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = '';
      });
    }
    
    /**
     * Manejador de éxito tras registrar cita
     */
    function onSuccessRegistroCita(respuesta) {
      if (typeof window.ocultarSpinner === 'function') window.ocultarSpinner();
      
      cerrarModalCita();

      Swal.fire({
        icon: 'success',
        title: 'Cita Agendada',
        text: respuesta || 'La cita se registró correctamente.',
        timer: 2500,
        showConfirmButton: false,
        timerProgressBar: true
      });

      if (window.actualizarVistasPostAccion) {
        window.actualizarVistasPostAccion();
      }
    }
    /**
     * Elimina una cita tras confirmar con el usuario
     */
    function eliminarCita(numFila) {
      Swal.fire({
        title: '¿Eliminar cita?',
        text: "Esta acción no se puede deshacer.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Sí, eliminar'
      }).then((result) => {
        if (result.isConfirmed) {
          if (window.mostrarSpinner) window.mostrarSpinner();
          google.script.run
            .withSuccessHandler(() => {
              if (window.ocultarSpinner) window.ocultarSpinner();
              Swal.fire('Eliminado', 'La cita ha sido borrada.', 'success');
              // Refrescamos el modal de listado haciendo clic en el botón de filtro
              document.getElementById('btnFiltrarViewCitasHoy').click();
            })
            .eliminarFilaCitaServidor(numFila);
        }
      });
    }

    /**
     * Carga los datos de una cita en el modal de registro para editarla
     */
    function editarCita(numFila) {
      // 1. Cerramos el modal de listado
      const modalListado = bootstrap.Modal.getInstance(document.getElementById('modalListadoCitas'));
      if (modalListado) modalListado.hide();

      if (window.mostrarSpinner) window.mostrarSpinner();

      // 2. Buscamos los datos en el servidor
      google.script.run
        .withSuccessHandler(datos => {
          if (window.ocultarSpinner) window.ocultarSpinner();
          
          // Abrimos el modal de registro
          abrirModalCita();

          // 3. Poblamos los campos
          document.getElementById('fechaInputCitaModal').value = datos.fecha;
          document.getElementById('horaInputCitaModal').value = datos.hora;
          document.getElementById('clientesDatalistCitaModal').value = datos.cliente;
          document.getElementById('agentesDisponiblesDatalistCitaModal').value = datos.agente;
          document.getElementById('tipoOATCDatalistCitaModal').value = datos.servicio;
          
          document.getElementById('fechaInputCitaModal').dataset.filaEditar = numFila;
          
          const btnGuardar = document.querySelector('button[onclick="guardarCita()"]');
          if(btnGuardar) btnGuardar.textContent = "Actualizar Cita";
        })
        .obtenerDatosCitaPorFila(numFila);
    }
    /**
     * Recopila y envía el formulario de cita
     */
    function guardarCita() {
      const filaAEditar = document.getElementById('fechaInputCitaModal').dataset.filaEditar;
      const CitaForm = {
        numFila: filaAEditar || null,
        fechaCita: document.getElementById('fechaInputCitaModal')?.value,
        horaCita: document.getElementById('horaInputCitaModal')?.value,
        nombreClienteOATC: document.getElementById('clientesDatalistCitaModal')?.value,
        nombreAgenteOATC: document.getElementById('agentesDisponiblesDatalistCitaModal')?.value,
        tipoOATC: document.getElementById('tipoOATCDatalistCitaModal')?.value
      };

      if (!CitaForm.fechaCita || !CitaForm.horaCita || !CitaForm.nombreClienteOATC) {
        Swal.fire({
          icon: 'warning',
          title: 'Datos Incompletos',
          text: 'La fecha, hora y cliente son obligatorios para agendar.',
          confirmButtonColor: '#f39c12'
        });
        return;
      }

      if (typeof window.mostrarSpinner === 'function') window.mostrarSpinner();

      google.script.run
        .withSuccessHandler(onSuccessRegistroCita)
        .withFailureHandler(err => {
          if (typeof window.ocultarSpinner === 'function') window.ocultarSpinner();
          window.onFailureConexion(err);
        })
        .registrarCita(CitaForm);
    }

    // --- MEJORA DE UX DE CLIENTES ---
    const initClienteCitaInputUX = () => {
      const inputCliente = document.getElementById('clientesDatalistCitaModal');
      if (inputCliente) {
        inputCliente.addEventListener('input', function(e) {
          const val = e.target.value;
          if (val.includes(' | DNI:')) {
            const parts = val.split(' | DNI:');
            e.target.value = parts[0].trim();
          }
        });
      }
    };
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initClienteCitaInputUX);
    } else {
      initClienteCitaInputUX();
    }

    // --- EXPOSICIÓN GLOBAL ---
    window.abrirModalCita = abrirModalCita;
    window.cerrarModalCita = cerrarModalCita;
    window.guardarCita = guardarCita;
    window.editarCita = editarCita;
    window.eliminarCita = eliminarCita;

})();
</script>
