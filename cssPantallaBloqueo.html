/* ==========================================================================
   9. PANTALLA DE BLOQUEO SPA UNIFICADA (GLASSMORPHISM)
   ========================================================================== */
#pantallaBloqueo {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 50%, #0f3460, #08080e 90%);
    z-index: 999999 !important; /* Por encima de absolutamente todo */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    color: #ffffff;
}

.lock-card {
    background: rgba(18, 18, 18, 0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    position: relative;
    text-align: center;
    animation: lockFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.lock-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #e94560, transparent, #0f3460);
    border-radius: 26px;
    z-index: -1;
    filter: blur(8px);
    opacity: 0.3;
}

.lock-header {
    margin-bottom: 25px;
}

.lock-header h2 {
    font-weight: 800;
    font-size: 2rem !important;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 10px;
}

.lock-form-control {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    color: #fff !important;
    border-radius: 12px !important;
    padding: 12px 20px !important;
    font-size: 1rem !important;
    height: auto !important;
    transition: all 0.3s ease;
}

.lock-form-control:focus {
    background: rgba(255, 255, 255, 0.1) !important;
    border-color: #e94560 !important;
    box-shadow: 0 0 10px rgba(233, 69, 96, 0.25) !important;
}

.lock-btn-submit {
    background: linear-gradient(135deg, #e94560, #ff758c) !important;
    border: none !important;
    color: white !important;
    font-weight: 700 !important;
    border-radius: 12px !important;
    padding: 12px !important;
    font-size: 1.1rem !important;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3) !important;
    width: 100%;
}

.lock-btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5) !important;
    filter: brightness(1.1);
}

.lock-spinner-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(8, 8, 14, 0.9);
    border-radius: 24px;
    z-index: 10;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.lock-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid #e94560;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes lockFadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
