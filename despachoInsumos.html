    <script>
      document.addEventListener('DOMContentLoaded', () => {
        cargarInsumos();
        cargarDespachos();
      });

      function cargarInsumos() {
        google.script.run
          .withSuccessHandler(function(insumos) {
            const body = document.getElementById('tablaInsumosBody');
            const select = document.getElementById('despachoInsumoId');
            
            if (!insumos || insumos.length === 0) {
              body.innerHTML = '<tr><td colspan="3" class="text-center py-3 text-muted">No hay insumos registrados.</td></tr>';
              select.innerHTML = '<option value="">No hay insumos disponibles</option>';
              return;
            }

            body.innerHTML = insumos.map(ins => `
              <tr>
                <td class="fw-bold">${ins.nombre}</td>
                <td><span class="badge ${ins.stock > 5 ? 'bg-success' : 'bg-danger'}">${ins.stock}</span></td>
                <td>${ins.unidad_medida}</td>
              </tr>
            `).join('');

            select.innerHTML = '<option value="">-- Seleccionar --</option>' + insumos.map(ins => `
              <option value="${ins.id}">${ins.nombre} (${ins.stock} ${ins.unidad_medida} disponibles)</option>
            `).join('');
          })
          .obtenerInsumosInventario();
      }

      function cargarDespachos() {
        google.script.run
          .withSuccessHandler(function(despachos) {
            const body = document.getElementById('tablaDespachosBody');
            if (!despachos || despachos.length === 0) {
              body.innerHTML = '<tr><td colspan="4" class="text-center py-3 text-muted">No se registran despachos.</td></tr>';
              return;
            }

            body.innerHTML = despachos.map(des => `
              <tr>
                <td>${new Date(des.fecha_despacho).toLocaleDateString('es-PE')}</td>
                <td class="fw-bold">${des.insumo_nombre}</td>
                <td>${des.cantidad}</td>
                <td>${des.destino || des.notas || '-'}</td>
              </tr>
            `).join('');
          })
          .obtenerDespachosRecientes();
      }

      function registrarNuevoInsumo(e) {
        e.preventDefault();
        const payload = {
          nombre: document.getElementById('insumoNombre').value,
          unidad_medida: document.getElementById('insumoUnidad').value,
          stock: parseInt(document.getElementById('insumoStock').value)
        };

        if (window.mostrarSpinner) window.mostrarSpinner("Guardando Insumo...");
        google.script.run
          .withSuccessHandler(function() {
            if (window.ocultarSpinner) window.ocultarSpinner();
            Swal.fire("Registrado", "El insumo ha sido ingresado correctamente.", "success");
            document.getElementById('formNuevoInsumo').reset();
            cargarInsumos();
          })
          .registrarInsumoServidor(payload);
      }

      function registrarDespacho(e) {
        e.preventDefault();
        const payload = {
          insumo_id: parseInt(document.getElementById('despachoInsumoId').value),
          cantidad: parseInt(document.getElementById('despachoCantidad').value),
          destino: document.getElementById('despachoNotas').value
        };

        if (window.mostrarSpinner) window.mostrarSpinner("Procesando Despacho...");
        google.script.run
          .withSuccessHandler(function() {
            if (window.ocultarSpinner) window.ocultarSpinner();
            Swal.fire("Despachado", "El stock de insumo ha sido actualizado.", "success");
            document.getElementById('formDespacho').reset();
            cargarInsumos();
            cargarDespachos();
          })
          .withFailureHandler(function(err) {
            if (window.ocultarSpinner) window.ocultarSpinner();
            Swal.fire("Error", err.message, "error");
          })
          .registrarDespachoServidor(payload);
      }
    </script>
