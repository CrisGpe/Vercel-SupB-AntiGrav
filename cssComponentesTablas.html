/* ==========================================================================
   7. ELEMENTOS DE CARGA (CORRECCIÓN DE CONGELAMIENTO Y CAPAS)
   ========================================================================== */

#loading-overlay {
    position: fixed;
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%;
    background: rgba(255, 255, 255, 0.8); /* Fondo un poco más denso para visibilidad */
    display: none; 
    justify-content: center;
    align-items: center;
    /* 🚨 AJUSTE CRUCIAL: z-index superior a Modales (1050) y SweetAlert (1060+) */
    z-index: 2000 !important; 
    flex-direction: column;
    pointer-events: none; 
}

/* Solo bloqueamos clics cuando el spinner esté realmente visible */
#loading-overlay[style*="display: flex"] {
    pointer-events: all;
}

.spinner-custom {
    width: 60px; /* Un poco más grande para que destaque */
    height: 60px;
    border: 6px solid #f3f3f3;
    border-top: 6px solid var(--color-morado); 
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

@keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
}

.loading-text {
    margin-top: 15px;
    font-weight: 800;
    color: var(--color-morado);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
}

.modal-content { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
