<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Módulo ATC Gloss</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-glass: rgba(18, 18, 18, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --primary-glow: #e94560;
            --secondary-glow: #0f3460;
            --text-glow: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, var(--secondary-glow), #08080e 80%);
            color: var(--text-glow);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary-glow), transparent, var(--secondary-glow));
            border-radius: 22px;
            z-index: -1;
            filter: blur(8px);
            opacity: 0.3;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: #fff;
            border-radius: 12px;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-glow);
            color: #fff;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.2);
        }

        .form-label {
            font-size: 0.9rem;
            color: #b3b3b3;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: #ff758c;
            border-radius: 12px 0 0 12px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-glow), #ff758c);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
            filter: brightness(1.1);
        }

        /* Spinner overlays */
        #spinner-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(8, 8, 14, 0.85);
            border-radius: 20px;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner-glow {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="spinner-overlay">
            <div class="spinner-glow"></div>
            <p class="mt-3 text-muted small">Verificando Credenciales Relacionales...</p>
        </div>

        <div class="login-header">
            <img src="https://img.icons8.com/neon/96/diamond.png" alt="Gloss Logo">
            <h2>GLOSS SALÓN</h2>
            <p class="text-muted small">Módulo ATC & Control de Operaciones 2.0</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="developer" required autocomplete="username">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-submit w-100 mt-2">
                Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
            </button>
        </form>
    </div>

    <script>
        console.log("DEBUG: loginHtml.html cargado en el navegador.");
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const spinner = document.getElementById('spinner-overlay');

            console.log("DEBUG: Intento de inicio de sesión para el usuario:", user);
            spinner.style.display = 'flex';

            google.script.run
                .withSuccessHandler(function(res) {
                    console.log("DEBUG: Respuesta del servidor (autenticarUsuario):", res);
                    if (res && res.success) {
                        // Guardar datos de sesión locales
                        localStorage.setItem("user_token", res.token);
                        localStorage.setItem("user_role", res.rol);
                        localStorage.setItem("user_name", res.nombre);
                        console.log("DEBUG: Sesión local guardada. Rol:", res.rol, "Token:", res.token);

                        Swal.fire({
                            icon: 'success',
                            title: '¡Acceso Concedido!',
                            text: 'Haga clic para cargar el Módulo correspondiente a su Rol...',
                            confirmButtonText: 'Cargar Módulo',
                            allowOutsideClick: false
                        }).then((result) => {
                            // En entornos altamente restrictivos de Google, window.open(url, '_top')
                            // a veces rompe la comunicación de origen si se pasa como parámetro de query.
                            // Usaremos window.top.location.href para forzar la navegación del Frame Principal
                            // de forma directa y nativa, lo cual tiene un mayor nivel de confianza en Chrome.
                            const url = window.location.href.split('?')[0] + `?rol=${res.rol}`;
                            console.log("DEBUG: Navegación de nivel superior a la URL:", url);
                            
                            try {
                                window.top.location.href = url;
                            } catch(e) {
                                console.warn("DEBUG: Falla en window.top.location, reintentando con window.open...", e);
                                window.open(url, '_top');
                            }
                        });
                    } else {
                        console.warn("DEBUG: Autenticación fallida. Mensaje del servidor:", res ? res.message : "Ninguno");
                        spinner.style.display = 'none';
                        Swal.fire({
                            icon: 'error',
                            title: 'Credenciales Incorrectas',
                            text: res.message || 'Verifique sus datos e intente nuevamente.'
                        });
                    }
                })
                .withFailureHandler(function(err) {
                    console.error("DEBUG: Error al invocar autenticarUsuario en el servidor:", err);
                    spinner.style.display = 'none';
                    Swal.fire({
                        icon: 'error',
                        title: 'Error de Servidor',
                        text: err.message || 'No se pudo comunicar con el validador.'
                    });
                })
                .autenticarUsuario(user, pass);
        });
    </script>
</body>
</html>
