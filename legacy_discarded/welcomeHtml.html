<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida - Sistema Gloss 2.0</title>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 50%, #0f3460, #08080e 80%);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rol-badge {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #ff758c;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        p {
            color: #b3b3b3;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-action {
            background: linear-gradient(135deg, #e94560, #ff758c);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
            filter: brightness(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <img src="https://img.icons8.com/neon/96/diamond.png" alt="Gloss Logo" style="margin-bottom: 20px;">
        <h1 id="userGreeting">¡Hola!</h1>
        <div class="rol-badge" id="userRole">Acceso Autorizado</div>
        <p>Has ingresado exitosamente al Módulo ATC & Control de Operaciones de Gloss Salón.</p>
        
        <!-- Botón para cerrar sesión y volver a probar -->
        <button class="btn-action" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        // Recuperamos la información del usuario del localStorage
        const nombre = localStorage.getItem("user_name") || "Usuario";
        const rol = localStorage.getItem("user_role") || "recepcion";

        // Inyectamos la información de forma dinámica y súper limpia
        document.getElementById("userGreeting").innerText = `¡Hola, ${nombre}!`;
        document.getElementById("userRole").innerText = `Rol: ${rol}`;

        function logout() {
            localStorage.clear();
            // Redirigir a la URL limpia sin parámetros para volver al Login
            const url = window.location.href.split('?')[0];
            window.open(url, '_top');
        }
    </script>

</body>
</html>
